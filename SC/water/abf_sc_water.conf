
structure               $base/Config/structure.psf
coordinates             $base/Config/coordinates.pdb
#extendedSystem          $base/Config/box.xsc

set temperature         305.15;
outputName              water_abf; # base name for output from this run
                                            # NAMD writes two files at the end, final coord and vel
                                           # in the format of first-dyn.coor and first-dyn.vel

#temperature             $temperature
set inputname           water_abf;
binCoordinates          $restart/$inputname.coor;    # coordinates from last run (binary)
binVelocities           $restart/$inputname.vel;     # velocities from last run (binary)
extendedSystem          $restart/$inputname.xsc;     # cell dimensions from last run (binary)

 
restartfreq             500000;               # 500000 steps = every 1ns
dcdfreq                 50000;
dcdUnitCell             yes;                # the file will contain unit cell info in the style of
                                            # charmm dcd files. if yes, the dcd files will contain
                                            # unit cell information in the style of charmm DCD files.
xstFreq                 50000;               # XSTFreq: control how often the extended systen configuration
                                            # will be appended to the XST file
outputEnergies          50000;               # 5000 steps = every 10ps
                                            # The number of timesteps between each energy output of NAMD
outputTiming            50000;               # The number of timesteps between each timing output shows
                                            # time per step and time to completion

# Force-Field Parameters
paraTypeCharmm          on;                 # We're using charmm type parameter file(s)
                                            # multiple definitions may be used but only one file per definition
parameters              $base/Config/parameters.prm

# These are specified by CHARMM
exclude                 scaled1-4           # non-bonded exclusion policy to use "none,1-2,1-3,1-4,or scaled1-4"
                                            # 1-2: all atoms pairs that are bonded are going to be ignored
                                            # 1-3: 3 consecutively bonded are excluded
                                            # scaled1-4: include all the 1-3, and modified 1-4 interactions
                                            # electrostatic scaled by 1-4scaling factor 1.0
                                            # vdW special 1-4 parameters in charmm parameter file.
oneFourScaling          1.0
switching               on
vdwForceSwitching       yes;                # New option for force-based switching of vdW
                                            # if both switching and vdwForceSwitching are on CHARMM force
                                            # switching is used for vdW forces.

# You have some freedom choosing the cutoff
cutoff                  12.0;               # may use smaller, maybe 10., with PME
switchdist              10.0;               # cutoff - 2.
                                            # switchdist - where you start to switch
                                            # cutoff - where you stop accounting for nonbond interactions.
                                            # correspondence in charmm:
                                            # (cutnb,ctofnb,ctonnb = pairlistdist,cutoff,switchdist)
pairlistdist            16;               # stores the all the pairs with in the distance it should be larger
                                            # than cutoff( + 2.)
stepspercycle           20;                 # 20 redo pairlists every ten steps
pairlistsPerCycle       2;                  # 2 is the default
                                            # cycle represents the number of steps between atom reassignments
                                            # this means every 20/2=10 steps the pairlist will be updated

# Integrator Parameters
timestep                2.0;                # fs/step
rigidBonds              all;                # Bound constraint all bonds involving H are fixed in length
nonbondedFreq           1;                  # nonbonded forces every step
fullElectFrequency      2;                  # PME every step

wrapWater               off;                 # wrap water to central cell
wrapAll                 off;                 # wrap other molecules too
wrapNearest             off;                # use for non-rectangular cells (wrap to the nearest image)

# PME (for full-system periodic electrostatics)
PME                     yes;
PMEInterpOrder          6;                  # interpolation order (spline order 6 in charmm)
PMEGridSpacing          1.0;                # maximum PME grid space / used to calculate grid size


# Constant Temperature Controls
stochRescale            on;                 #stochastic rescale thermostat
stochRescaleTemp        $temperature;       
stochRescalePeriod      1;            
stochRescaleHeat        yes;       

colvars                 on
colvarsconfig           colvars.in
colvarsInput            $restart/water_abf.restart.colvars.state
# run
reinitvels              $temperature
numsteps                20000000;             # run stops when this step is reached
run                     20000000 ;             # 100 ns
